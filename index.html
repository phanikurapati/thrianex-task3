<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JavaScript To-Do List Application with CRUD operations and localStorage persistence">
    
    <title>To-Do List App</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">

        <header>
            <h1>📝 To-Do List Application</h1>
            <p>
                Manage your tasks with Create, Read, Update,
                Delete, and Filtering functionality.
            </p>
        </header>

        <!-- Add Task Form -->
        <section class="task-section">

            <form id="task-form">
                <input
                    type="text"
                    id="task-input"
                    placeholder="Enter a new task..."
                    aria-label="Task Input"
                    required>

                <button type="submit">
                    Add Task
                </button>
            </form>

        </section>

        <!-- Filter Buttons -->
        <section class="filter-section">

            <h2>Filter Tasks</h2>

            <div class="filters">

                <button
                    type="button"
                    data-filter="all">
                    All
                </button>

                <button
                    type="button"
                    data-filter="active">
                    Active
                </button>

                <button
                    type="button"
                    data-filter="completed">
                    Completed
                </button>

            </div>

        </section>

        <!-- Task List -->
        <section class="list-section">

            <h2>Task List</h2>

            <ul
                id="task-list"
                aria-label="Task List">
            </ul>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
